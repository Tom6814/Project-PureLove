name: Deploy Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firebase.json
      - .firebaserc
      - .github/workflows/deploy-firestore-rules.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Configure Firebase credentials
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_PURELOVE_34E8D: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PURELOVE_34E8D }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "FIREBASE_AUTH_MODE=token" >> "$GITHUB_ENV"
            echo "FIREBASE_PROJECT_ID=gemini31-488405" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$FIREBASE_SERVICE_ACCOUNT_PURELOVE_34E8D" ]; then
            echo "Missing secrets: set FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT_PURELOVE_34E8D" >&2
            exit 1
          fi
          if printf '%s' "$FIREBASE_SERVICE_ACCOUNT_PURELOVE_34E8D" | head -c 1 | grep -q '{'; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_PURELOVE_34E8D" > "$RUNNER_TEMP/firebase-sa.json"
          else
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_PURELOVE_34E8D" | base64 --decode > "$RUNNER_TEMP/firebase-sa.json"
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/firebase-sa.json','utf8')).project_id; if(!p) process.exit(1); console.log('FIREBASE_PROJECT_ID='+p)" >> "$GITHUB_ENV"
          echo "FIREBASE_AUTH_MODE=service_account" >> "$GITHUB_ENV"

      - name: Deploy Firestore Rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ "$FIREBASE_AUTH_MODE" = "token" ]; then
            firebase deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"
          else
            firebase deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID"
          fi
